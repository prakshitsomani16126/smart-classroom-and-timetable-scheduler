<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 Smart</h2>
    <a href="/dashboard" class="active">🏠 Dashboard</a>
    <a href="/add">➕ Manage</a>
    <a href="/timetable_page">📅 Timetable</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <h3>Dashboard Overview</h3>
    <button onclick="toggleDark()">🌙</button>
</div>

<div class="content">

<!-- STATS -->
<div class="stats-grid">

<div class="stat-card blue">
    <h2 id="classCount">0</h2>
    <p>Classrooms</p>
</div>

<div class="stat-card green">
    <h2 id="subjectCount">0</h2>
    <p>Subjects</p>
</div>

<div class="stat-card purple">
    <h2 id="scheduleCount">0</h2>
    <p>Schedules</p>
</div>

</div>

<!-- CHART -->
<div class="card">
    <h3>Weekly Activity</h3>
    <canvas id="myChart"></canvas>
</div>

</div>

</div>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

// LOAD STATS
async function loadStats() {
    let c = await fetch("/api/classrooms").then(r=>r.json());
    let s = await fetch("/api/subjects").then(r=>r.json());
    let t = await fetch("/api/timetable").then(r=>r.json());

    document.getElementById("classCount").innerText = c.length;
    document.getElementById("subjectCount").innerText = s.length;
    document.getElementById("scheduleCount").innerText = t.length;

    // CHART
    new Chart(document.getElementById("myChart"), {
        type: 'bar',
        data: {
            labels: ['Classrooms', 'Subjects', 'Schedules'],
            datasets: [{
                label: 'Data',
                data: [c.length, s.length, t.length]
            }]
        }
    });
}

loadStats();
</script>

</body>
</html>
