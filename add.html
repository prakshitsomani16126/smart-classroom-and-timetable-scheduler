<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">

<div class="sidebar">
    <h2>🎓 Smart</h2>
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/add" class="active">➕ Manage</a>
    <a href="/timetable_page">📅 Timetable</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

<div class="topbar">
    <h3>Manage Data</h3>
</div>

<div class="content">

<div class="grid">

<div class="card">
<h3>🏫 Add Classroom</h3>
<input id="classroomName" placeholder="Room No">
<button onclick="addClassroom()">Add</button>
</div>

<div class="card">
<h3>📘 Add Subject</h3>
<input id="subjectName" placeholder="Subject">
<button onclick="addSubject()">Add</button>
</div>

<div class="card wide">
<h3>📅 Schedule Class</h3>

<div class="form-row">
<select id="classroomSelect"></select>
<select id="subjectSelect"></select>
<input id="day" placeholder="Monday">
<input id="time" placeholder="10:00">
<button onclick="addTimetable()">Schedule</button>
</div>

</div>

<div class="card wide ai-card">

<h3>🤖 AI Timetable Generator</h3>

<div class="ai-grid">

<div>
<label>Classroom</label>
<select id="aiClassroom"></select>
</div>

<div>
<label>Subjects</label>
<div id="subjectCheckboxes" class="checkbox-grid"></div>
</div>

<div>
<label>Days</label>
<input id="days" placeholder="Mon, Tue, Wed, Thu, Fri">
</div>

<div>
<label>Time Slots</label>
<input id="times" placeholder="10:00, 11:00, 12:00">
</div>

</div>

<button onclick="autoGenerate()">🤖 Auto Generate Timetable</button>
<button class="delete-all-btn" onclick="clearData()">🧹 Clear All Timetable</button>

</div>

</div> <!-- grid -->
</div> <!-- content -->
</div> <!-- main -->
</div> <!-- layout -->

<script src="/static/script.js"></script>
</body>
</html>
